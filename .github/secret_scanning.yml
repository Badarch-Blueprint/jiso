# GitHub secret-scanning path exclusions.
#
# The VS Code source tree contains many unit tests that assert secret-REDACTION
# behavior, so they embed fabricated, secret-shaped fixtures (e.g. a dummy Google
# API key or a `mongodb+srv://user:pass@host` URI) purely to prove the scrubber
# removes them. These are not real credentials; excluding test/spec paths stops
# GitHub from raising false-positive "publicly leaked secret" alerts on them.
#
# Non-test code is still fully scanned.
paths-ignore:
  - "**/test/**"
  - "**/tests/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/*.test.js"
  - "**/*.spec.js"
